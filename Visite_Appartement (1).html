<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Visite appartement</title>
<style>
  :root{
    --bg:#f5f7fa;--card:#fff;--ink:#1a1a1a;--muted:#5b6470;--line:#e2e7ee;
    --accent:#7fa8c9;--accent-soft:#e7f0f7;
    --ok:#dcefe4;--ok-line:#9fcbb4;--ok-ink:#2f6f53;
    --nok:#f6dede;--nok-line:#d6a0a0;--nok-ink:#a14b4b;
    --danger:#c97f7f;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;font-size:16px;line-height:1.4;}
  header{position:sticky;top:0;z-index:10;background:var(--card);border-bottom:1px solid var(--line);padding:14px 16px;display:flex;align-items:center;gap:12px;}
  header h1{font-size:18px;margin:0;font-weight:600;}
  .back{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:10px;padding:8px 12px;font-size:15px;cursor:pointer;}
  main{padding:16px;max-width:760px;margin:0 auto;}
  .sub{color:var(--muted);font-size:14px;margin:2px 0 0;}
  .btn{display:block;width:100%;border:none;border-radius:12px;background:var(--accent);color:#fff;font-size:16px;font-weight:600;padding:14px;cursor:pointer;margin-top:14px;}
  .btn.secondary{background:var(--accent-soft);color:var(--ink);}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px;cursor:pointer;}
  .card h3{margin:0;font-size:17px;font-weight:600;}
  .row{display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .pill{font-size:13px;color:var(--muted);}
  .pill.nok{color:var(--nok-ink);font-weight:600;}
  .bar{height:6px;background:var(--line);border-radius:6px;overflow:hidden;margin-top:10px;}
  .bar > span{display:block;height:100%;background:var(--ok-line);width:0;}
  .empty{text-align:center;color:var(--muted);padding:40px 10px;}
  .form label{display:block;font-size:14px;color:var(--muted);margin:12px 0 4px;}
  .form input{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;font-size:16px;background:#fff;color:var(--ink);}
  .section{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden;}
  .section > .head{padding:13px 14px;font-weight:600;font-size:16px;border-bottom:1px solid var(--line);background:#fbfcfe;}
  .item{padding:12px 14px;border-bottom:1px solid var(--line);}
  .item:last-of-type{border-bottom:none;}
  .item .label{font-size:15px;margin-bottom:8px;}
  .choices{display:flex;gap:8px;}
  .choices button{flex:0 0 auto;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:10px;padding:8px 18px;font-size:14px;font-weight:600;cursor:pointer;}
  .item.ok .ok-btn{background:var(--ok);border-color:var(--ok-line);color:var(--ok-ink);}
  .item.nok .nok-btn{background:var(--nok);border-color:var(--nok-line);color:var(--nok-ink);}
  .cmt{width:100%;margin-top:8px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:inherit;background:#fff;color:var(--ink);}
  .photos{padding:12px 14px;border-top:1px solid var(--line);background:#fbfcfe;}
  .addrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .addbtn{border:1px solid var(--accent);background:var(--accent-soft);color:var(--ink);border-radius:10px;padding:10px 14px;font-size:14px;cursor:pointer;}
  .galbtn{border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:10px;padding:10px 14px;font-size:14px;cursor:pointer;}
  .thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
  .thumb{width:72px;height:72px;border-radius:10px;object-fit:cover;border:1px solid var(--line);cursor:pointer;}
  .overlay{position:fixed;inset:0;background:rgba(20,24,30,.88);z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;padding:18px;}
  .overlay img,.overlay video{max-width:100%;max-height:72vh;border-radius:12px;background:#000;}
  .overlay .acts{display:flex;gap:10px;margin-top:16px;}
  .overlay button{border:none;border-radius:10px;padding:12px 20px;font-size:15px;font-weight:600;cursor:pointer;}
  .overlay .close{background:#fff;color:var(--ink);}
  .overlay .del{background:var(--danger);color:#fff;}
  .overlay .shoot{background:var(--accent);color:#fff;}
  footer{text-align:center;color:var(--muted);font-size:13px;padding:18px;}
  .toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 16px;border-radius:10px;font-size:14px;opacity:0;transition:opacity .2s;z-index:60;pointer-events:none;}
  .toast.show{opacity:1;}
</style>
</head>
<body>
<header>
  <button class="back" id="backBtn" style="display:none">Retour</button>
  <div><h1 id="title">Visite appartement</h1><p class="sub" id="subtitle">Une fiche par appartement</p></div>
</header>
<main id="app"></main>
<footer>Auteur : Patrice Aubert</footer>

<input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none">
<input type="file" id="galInput" accept="image/*" style="display:none">
<input type="file" id="importInput" accept="application/json,.json" style="display:none">

<div class="overlay" id="camera">
  <video id="camVideo" autoplay playsinline muted></video>
  <div class="acts">
    <button class="close" id="camCancel">Annuler</button>
    <button class="shoot" id="camShoot">Capturer</button>
  </div>
</div>

<div class="overlay" id="viewer">
  <img id="viewerImg" alt="">
  <div class="acts">
    <button class="close" id="viewerClose">Fermer</button>
    <button class="del" id="viewerDel">Supprimer</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const mem=new Map();
let HAS_LS=false;
try{const _k='__vatest';window.localStorage.setItem(_k,'1');window.localStorage.removeItem(_k);HAS_LS=true;}catch(e){HAS_LS=false;}
const store={
  async get(k){
    if(window.storage){try{const r=await window.storage.get(k,false);return r?r.value:null;}catch(e){}}
    if(HAS_LS){const v=window.localStorage.getItem(k);return v===null?null:v;}
    return mem.has(k)?mem.get(k):null;
  },
  async set(k,v){
    if(window.storage){try{await window.storage.set(k,v,false);return;}catch(e){}}
    if(HAS_LS){try{window.localStorage.setItem(k,v);return;}catch(e){toast("Stockage plein");}}
    mem.set(k,v);
  },
  async del(k){
    if(window.storage){try{await window.storage.delete(k,false);return;}catch(e){}}
    if(HAS_LS){try{window.localStorage.removeItem(k);return;}catch(e){}}
    mem.delete(k);
  }
};

const SECTIONS=[
  {id:'ext',title:'1 - Extérieur et quartier',items:["Distance à pied jusqu'au lycée Vinci","Arrêt de bus et fréquence","Commerces de proximité","Bruit de la rue","Sécurité et éclairage le soir","Stationnement vélo et voiture"]},
  {id:'com',title:'2 - Parties communes',items:["Propreté hall, escaliers, ascenseur","Boîtes aux lettres","Local poubelles et vélos","Interphone ou digicode","Étage et ascenseur"]},
  {id:'ent',title:'3 - Entrée et état général',items:["Porte et serrure solides","Luminosité générale","Aération générale (odeurs, renouvellement d'air)","Traces de moisissure murs et plafonds","État des sols et peintures"]},
  {id:'sej',title:'4 - Séjour et espace commun',items:["Surface suffisante pour deux","Meublé ou non, état des meubles","Fenêtres et orientation","Chauffage dans la pièce","Nombre de prises électriques","Luminosité suffisante pour travailler sur PC (lumière du jour + éclairage)","Place pour un coin bureau (table, prise à proximité)","Réception WiFi correcte dans le séjour","Machine à laver présente ou emplacement prévu (arrivée d'eau, évacuation)","Espace pour sécher le linge (étendoir, balcon, sèche-linge)"]},
  {id:'cui',title:'5 - Cuisine',items:["Électroménager fourni (plaques, four, frigo, hotte)","Appareils testés et fonctionnels","Plan de travail et rangements pour deux","Pression de l'eau testée","Qualité de l'eau (couleur, odeur)","Évier et robinetterie sans fuite","Aération ou hotte fonctionnelle"]},
  {id:'sdb',title:'6 - Salle de bain et WC',items:["WC séparé ou non","Chasse d'eau fonctionnelle","WC sans odeur (siphon, ventilation)","Pression de l'eau chaude testée","Qualité de l'eau (couleur, odeur)","VMC ou fenêtre pour l'aération","Joints et sanitaires en bon état","Rangement pour deux"]},
  {id:'cha',title:'7 - Les deux chambres',items:["Surfaces équivalentes ou écart noté","Lit, bureau, armoire possibles dans chaque","Fenêtre et luminosité dans chaque","Chauffage dans chaque chambre","Prises électriques (bureau et lit)","Verrou sur chaque porte","Isolation au bruit entre les chambres","Luminosité au bureau pour travailler sur PC (lumière naturelle, sans reflets sur l'écran)","Prise de courant à proximité immédiate du bureau","Réception WiFi correcte dans chaque chambre","Qualité de la literie (matelas, sommier, état)"]},
  {id:'tec',title:'8 - Points techniques',items:["Type de chauffage et qui paie","Double vitrage sur toutes les fenêtres","DPE présent et classe relevée (souvent D ou pire)","Présence et fermeture des volets","Présence de rideaux ou stores","Éligibilité fibre vérifiée à l'adresse (test en ligne)","Compteurs individuels ou communs","État du tableau électrique","Emplacement de la prise fibre ou téléphone (point de départ du WiFi)"]},
  {id:'col',title:'9 - Colocation à deux',items:["Bail unique ou bail individuel","Clause de solidarité","Répartition des charges","Garant par locataire ou Visale accepté","Modalités si une colocataire part"]},
  {id:'bai',title:'10 - Questions au bailleur',items:["Loyer charges comprises et détail","Dépôt de garantie","Durée et type de bail","Assurance habitation exigée","Délai de préavis","Date de disponibilité réelle"]}
];
const TOTAL=SECTIONS.reduce((n,s)=>n+s.items.length,0);

let index=[], current=null, aptState=null, saveTimer=null, idxTimer=null;
let stream=null, pendingSection=null;

const appEl=document.getElementById('app'),titleEl=document.getElementById('title'),subEl=document.getElementById('subtitle'),backBtn=document.getElementById('backBtn');

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),1600);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function headerSub(a){
  const addr=a&&a.address?esc(a.address):'';
  const c=a&&a.contact?esc(a.contact):'';
  const p=a&&a.phone?esc(a.phone):'';
  let line2='';
  if(c) line2+=c;
  if(p){ const tel=p.replace(/[^+0-9]/g,''); line2+=(c?' - ':'')+'<a href="tel:'+tel+'" style="color:var(--accent);text-decoration:none">'+p+'</a>'; }
  return addr + (line2?((addr?'<br>':'')+line2):'');
}
function saveIndexSoon(){ clearTimeout(idxTimer); idxTimer=setTimeout(saveIndex,400); }

async function loadIndex(){const v=await store.get('apt_index');index=v?JSON.parse(v):[];}
async function saveIndex(){await store.set('apt_index',JSON.stringify(index));}
function emptyState(){return {states:{},comments:{},photos:[]};}
async function loadApt(id){const v=await store.get('apt_'+id);aptState=v?JSON.parse(v):emptyState();aptState.states=aptState.states||{};aptState.comments=aptState.comments||{};aptState.photos=aptState.photos||[];}
function queueSave(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>store.set('apt_'+current,JSON.stringify(aptState)),350);}
async function flushSave(){if(saveTimer){clearTimeout(saveTimer);saveTimer=null;}if(current&&aptState)await store.set('apt_'+current,JSON.stringify(aptState));}
function answered(s){return Object.values(s.states||{}).filter(v=>v).length;}
function nokCount(s){return Object.values(s.states||{}).filter(v=>v==='nok').length;}

async function goHome(){await flushSave();renderHome();}

async function renderHome(){
  current=null;aptState=null;backBtn.style.display='none';
  titleEl.textContent='Visite appartement';subEl.textContent='Une fiche par appartement';
  await loadIndex();
  let h='';
  if(!index.length){h+='<div class="empty">Aucun appartement enregistré.<br>Ajoute ta première visite.</div>';}
  else{
    for(const a of index){
      const v=await store.get('apt_'+a.id);const s=v?JSON.parse(v):emptyState();
      const done=answered(s),nok=nokCount(s),pct=Math.round(done/TOTAL*100);
      h+=`<div class="card" data-open="${a.id}">
        <div class="row"><h3>${esc(a.name)}</h3><span class="pill">${done}/${TOTAL}</span></div>
        <p class="sub">${esc(a.address||'')}</p>
        <div class="bar"><span style="width:${pct}%"></span></div>
        <div class="row" style="margin-top:8px">
          <span class="pill ${nok?'nok':''}">${nok} NOK</span>
          <span class="pill">${(s.photos||[]).length} photo(s)</span>
        </div></div>`;
    }
  }
  h+='<button class="btn" id="addApt">Nouvel appartement</button>';
  h+='<div style="display:flex;gap:10px"><button class="btn secondary" id="expBtn">Exporter mes fiches</button><button class="btn secondary" id="impBtn">Importer</button></div>';
  appEl.innerHTML=h;
  document.getElementById('addApt').onclick=renderNew;
  document.getElementById('expBtn').onclick=exportAll;
  document.getElementById('impBtn').onclick=()=>document.getElementById('importInput').click();
  appEl.querySelectorAll('[data-open]').forEach(e=>e.onclick=()=>openApt(e.getAttribute('data-open')));
}

function renderNew(){
  backBtn.style.display='';backBtn.onclick=goHome;
  titleEl.textContent='Nouvel appartement';subEl.textContent='Nom et adresse';
  appEl.innerHTML=`<div class="form card" style="cursor:default">
    <label>Nom (repère)</label><input id="nName" placeholder="ex: T3 rue des Halles">
    <label>Adresse</label><input id="nAddr" placeholder="ex: 12 rue des Halles, Montaigu">
    <label>Contact (nom)</label><input id="nContact" placeholder="ex: Agence Martin / M. Dupont">
    <label>Téléphone</label><input id="nPhone" inputmode="tel" placeholder="ex: 02 51 00 00 00">
  </div><button class="btn" id="create">Créer la fiche</button>`;
  document.getElementById('nName').focus();
  document.getElementById('create').onclick=async()=>{
    const name=document.getElementById('nName').value.trim(),addr=document.getElementById('nAddr').value.trim();
    const contact=document.getElementById('nContact').value.trim(),phone=document.getElementById('nPhone').value.trim();
    if(!name){toast('Indique au moins un nom');return;}
    const id=uid();index.unshift({id,name,address:addr,contact,phone,created:Date.now()});
    await saveIndex();await store.set('apt_'+id,JSON.stringify(emptyState()));
    openApt(id);
  };
}

async function openApt(id){
  current=id;await loadApt(id);
  const a=index.find(x=>x.id===id);
  backBtn.style.display='';backBtn.onclick=goHome;
  titleEl.textContent=a?a.name:'Appartement';subEl.innerHTML=headerSub(a);
  let h='';
  h+=`<div class="section"><div class="head">Contact</div><div style="padding:12px 14px">
    <input class="cmt" id="cName" placeholder="Nom du contact (agence, propriétaire)" value="${esc((a&&a.contact)||'')}">
    <input class="cmt" id="cPhone" inputmode="tel" placeholder="Téléphone" value="${esc((a&&a.phone)||'')}" style="margin-top:8px">
  </div></div>`;
  for(const sec of SECTIONS){
    h+=`<div class="section"><div class="head">${sec.title}</div>`;
    sec.items.forEach((label,i)=>{
      const k=sec.id+'_'+i,st=aptState.states[k]||'',cm=esc(aptState.comments[k]||'');
      h+=`<div class="item ${st}" data-item="${k}">
        <div class="label">${esc(label)}</div>
        <div class="choices"><button class="ok-btn" data-set="ok">OK</button><button class="nok-btn" data-set="nok">NOK</button></div>
        <input class="cmt" data-cmt="${k}" placeholder="Commentaire" value="${cm}">
      </div>`;
    });
    const ph=(aptState.photos||[]).filter(p=>p.section===sec.id);
    let th='';for(const p of ph)th+=`<img class="thumb" data-photo="${p.pid}" alt="photo">`;
    h+=`<div class="photos">
      <div class="addrow">
        <button class="addbtn" data-cam="${sec.id}">Prendre une photo</button>
        <button class="galbtn" data-gal="${sec.id}">Galerie</button>
        <span class="pill">${ph.length} photo(s)</span>
      </div><div class="thumbs" data-thumbs="${sec.id}">${th}</div>
    </div></div>`;
  }
  h+=`<button class="btn secondary" id="delApt">Supprimer cet appartement</button>`;
  appEl.innerHTML=h;

  const cn=document.getElementById('cName'),cp=document.getElementById('cPhone');
  function updContact(){const a2=index.find(x=>x.id===current);if(a2){a2.contact=cn.value;a2.phone=cp.value;subEl.innerHTML=headerSub(a2);}saveIndexSoon();}
  cn.oninput=updContact;cp.oninput=updContact;

  appEl.querySelectorAll('[data-item]').forEach(it=>{
    const k=it.getAttribute('data-item');
    it.querySelectorAll('[data-set]').forEach(b=>{
      b.onclick=()=>{
        const val=b.getAttribute('data-set');
        aptState.states[k]=(aptState.states[k]===val)?'':val;
        it.classList.toggle('ok',aptState.states[k]==='ok');
        it.classList.toggle('nok',aptState.states[k]==='nok');
        queueSave();
      };
    });
  });
  appEl.querySelectorAll('[data-cmt]').forEach(inp=>{
    inp.oninput=()=>{aptState.comments[inp.getAttribute('data-cmt')]=inp.value;queueSave();};
  });
  appEl.querySelectorAll('[data-cam]').forEach(b=>b.onclick=()=>{pendingSection=b.getAttribute('data-cam');document.getElementById('fileInput').click();});
  appEl.querySelectorAll('[data-gal]').forEach(b=>b.onclick=()=>{pendingSection=b.getAttribute('data-gal');document.getElementById('galInput').click();});
  appEl.querySelectorAll('[data-photo]').forEach(img=>{const pid=img.getAttribute('data-photo');loadThumb(pid,img);img.onclick=()=>viewPhoto(pid);});

  document.getElementById('delApt').onclick=async()=>{
    if(!confirm('Supprimer cet appartement et ses photos ?'))return;
    for(const p of (aptState.photos||[]))await store.del('photo_'+current+'_'+p.pid);
    await store.del('apt_'+current);
    index=index.filter(x=>x.id!==current);await saveIndex();renderHome();
  };
}

// ---- Appareil photo en live ----
async function startCamera(section){
  pendingSection=section;
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false});
    document.getElementById('camVideo').srcObject=stream;
    document.getElementById('camera').style.display='flex';
  }catch(e){
    toast("Ouverture de l'appareil photo");
    document.getElementById('fileInput').click();
  }
}
function stopCamera(){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}document.getElementById('camera').style.display='none';}
document.getElementById('camCancel').onclick=stopCamera;
document.getElementById('camShoot').onclick=async()=>{
  const v=document.getElementById('camVideo');
  const max=1280;let w=v.videoWidth,hh=v.videoHeight;
  if(w>hh&&w>max){hh=Math.round(hh*max/w);w=max;}else if(hh>=w&&hh>max){w=Math.round(w*max/hh);hh=max;}
  const c=document.createElement('canvas');c.width=w;c.height=hh;
  c.getContext('2d').drawImage(v,0,0,w,hh);
  const data=c.toDataURL('image/jpeg',0.6);
  stopCamera();
  await savePhoto(pendingSection,data);
};

function compressFile(file,section){
  const r=new FileReader();
  r.onload=()=>{const img=new Image();img.onload=async()=>{
    const max=1280;let w=img.width,hh=img.height;
    if(w>hh&&w>max){hh=Math.round(hh*max/w);w=max;}else if(hh>=w&&hh>max){w=Math.round(w*max/hh);hh=max;}
    const c=document.createElement('canvas');c.width=w;c.height=hh;c.getContext('2d').drawImage(img,0,0,w,hh);
    await savePhoto(section,c.toDataURL('image/jpeg',0.6));
  };img.src=r.result;};
  r.readAsDataURL(file);
}
document.getElementById('fileInput').onchange=e=>{const f=e.target.files[0];e.target.value='';if(f)compressFile(f,pendingSection);};
document.getElementById('galInput').onchange=e=>{const f=e.target.files[0];e.target.value='';if(f)compressFile(f,pendingSection);};

async function savePhoto(section,data){
  const pid=uid();
  await store.set('photo_'+current+'_'+pid,data);
  aptState.photos=aptState.photos||[];aptState.photos.push({pid,section,ts:Date.now()});
  queueSave();
  const box=appEl.querySelector(`[data-thumbs="${section}"]`);
  if(box){const img=document.createElement('img');img.className='thumb';img.src=data;img.setAttribute('data-photo',pid);img.onclick=()=>viewPhoto(pid);box.appendChild(img);}
  toast('Photo enregistrée');
}
async function loadThumb(pid,img){const d=await store.get('photo_'+current+'_'+pid);if(d)img.src=d;}

// ---- Visionneuse ----
let viewing=null;
async function viewPhoto(pid){viewing=pid;const d=await store.get('photo_'+current+'_'+pid);if(!d)return;document.getElementById('viewerImg').src=d;document.getElementById('viewer').style.display='flex';}
document.getElementById('viewerClose').onclick=()=>{document.getElementById('viewer').style.display='none';viewing=null;};
document.getElementById('viewerDel').onclick=async()=>{
  if(!viewing)return;
  await store.del('photo_'+current+'_'+viewing);
  aptState.photos=(aptState.photos||[]).filter(p=>p.pid!==viewing);queueSave();
  const img=appEl.querySelector(`[data-photo="${viewing}"]`);if(img)img.remove();
  document.getElementById('viewer').style.display='none';viewing=null;toast('Photo supprimée');
};

// ---- Export / Import ----
async function exportAll(){
  await loadIndex();
  const data={app:'visites_coloc',version:1,exportedAt:new Date().toISOString(),index,apts:{},photos:{}};
  for(const a of index){
    const s=await store.get('apt_'+a.id);
    const st=s?JSON.parse(s):emptyState();
    data.apts[a.id]=st;
    for(const p of (st.photos||[])){
      const d=await store.get('photo_'+a.id+'_'+p.pid);
      if(d) data.photos[a.id+'_'+p.pid]=d;
    }
  }
  try{
    const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const el=document.createElement('a');
    el.href=url;el.download='visites_coloc_'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(el);el.click();el.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1500);
    toast('Export téléchargé');
  }catch(e){ toast("Export impossible ici"); }
}
function importAll(file){
  const r=new FileReader();
  r.onload=async()=>{
    try{
      const data=JSON.parse(r.result);
      if(!data||!Array.isArray(data.index)) throw 0;
      await loadIndex();
      const ids=new Set(index.map(a=>a.id));
      for(const a of data.index){ if(!ids.has(a.id)){ index.push(a); ids.add(a.id);} }
      await saveIndex();
      for(const id in (data.apts||{})) await store.set('apt_'+id,JSON.stringify(data.apts[id]));
      for(const k in (data.photos||{})) await store.set('photo_'+k,data.photos[k]);
      toast('Import réussi');
      renderHome();
    }catch(e){ toast('Fichier invalide'); }
  };
  r.readAsText(file);
}
document.getElementById('importInput').onchange=e=>{const f=e.target.files[0];e.target.value='';if(f)importAll(f);};

renderHome();
</script>
